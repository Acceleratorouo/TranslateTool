# SonarQube / SonarCloud 集成配置
# 详见 docs/SONAR.md

sonar.projectKey=TranslateTool_TranslateTool
sonar.projectName=TranslateTool
sonar.projectVersion=1.0.0

# 项目描述
sonar.description=Desktop translation tool with Baidu/Google/Microsoft/DeepL engines

# 源代码目录
sonar.sources=src
sonar.tests=src/Tests

# 排除目录
sonar.exclusions=\
  src/bin/**,\
  src/obj/**,\
  src/Tests/bin/**,\
  src/Tests/obj/**,\
  **/*.designer.cs,\
  **/*.g.cs,\
  **/*.g.i.cs,\
  src/Resources/**,\
  src/Themes/**

# 测试包含
sonar.test.inclusions=**/*Tests.cs,**/*Test.cs
sonar.test.exclusions=**/bin/**,**/obj/**

# .NET 特定
sonar.cs.dotnet覆盖率.reportPaths=src/Tests/coverage.opencover.xml
sonar.cs.opencover.reportPaths=src/Tests/coverage.opencover.xml
sonar.cs.vstest.reportsPaths=**/TestResults/*.trx

# 质量门禁
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# 编码
sonar.sourceEncoding=UTF-8

# 重复检测
sonar.cpd.exclusions=**/AssemblyInfo.cs,**/GlobalUsings.cs

# 语言
sonar.language=cs
